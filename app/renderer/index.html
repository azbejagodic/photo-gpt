<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photo GPT Bridge</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell" aria-label="Photo GPT Bridge">
    <header class="title-row">
      <p id="connectionPill" class="server-line checking" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span>Checking server</span>
      </p>
      <h1>PHOTO GPT BRIDGE</h1>
      <div class="header-actions">
        <button id="qrBtn" class="header-button qr-button" type="button">QR</button>
        <button id="refreshBtn" class="header-button refresh-button" type="button">Refresh</button>
      </div>
    </header>

    <section class="main-grid" aria-label="Photos">
      <article class="panel pictures-panel" aria-labelledby="photosTitle">
        <div class="pictures-header">
          <h2 id="photosTitle">Pictures</h2>
          <div class="pictures-tools">
            <div class="view-toggle" role="group" aria-label="Pictures view">
              <button id="gridViewBtn" class="view-toggle-button" type="button">Grid</button>
              <button id="listViewBtn" class="view-toggle-button" type="button">List</button>
            </div>
            <label class="grid-count-control" for="gridCountSelect">
              <span>Grid</span>
              <select id="gridCountSelect" aria-label="Grid photos per page">
                <option value="auto">Auto</option>
                <option value="4">4</option>
                <option value="8">8</option>
                <option value="12">12</option>
                <option value="16">16</option>
              </select>
            </label>
            <button id="batchesBtn" class="download-all-button" type="button">History</button>
            <button id="downloadAllBtn" class="download-all-button" type="button" hidden>Download all</button>
            <div id="picturePagination" class="picture-pagination" hidden>
              <button id="prevPicturesPage" class="page-button" type="button" aria-label="Previous page">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M15 18l-6-6 6-6" />
                </svg>
              </button>
              <span id="picturesPageLabel" class="page-label">1 / 1</span>
              <button id="nextPicturesPage" class="page-button" type="button" aria-label="Next page">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M9 6l6 6-6 6" />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <p id="picturesMessage" class="pictures-message" hidden></p>
        <section id="batchesPanel" class="batches-panel" aria-label="Saved upload batches" hidden>
          <div class="batches-toolbar">
            <strong>Batches</strong>
            <select id="retentionSelect" class="retention-select" aria-label="Retention setting">
              <option value="">No automatic deletion</option>
              <option value="1">Delete after 1 day</option>
              <option value="7">Delete after 7 days</option>
              <option value="30">Delete after 30 days</option>
            </select>
            <button id="saveRetentionBtn" class="batch-button" type="button">Save</button>
            <button id="clearBatchesBtn" class="batch-button danger" type="button">Clear all</button>
          </div>
          <div id="batchesList" class="batches-list" tabindex="0" aria-label="Saved batches list"></div>
        </section>

        <div id="emptyState" class="empty-state" hidden>
          <h3 id="emptyStateTitle">No pictures yet</h3>
        </div>

        <div id="photoGrid" class="photo-grid"></div>
      </article>
    </section>

    <div id="qrModal" class="modal-backdrop" hidden>
      <section class="qr-modal" role="dialog" aria-modal="true" aria-labelledby="qrTitle">
        <h2 id="qrTitle">QR</h2>
        <div class="qr-frame">
          <canvas id="phoneQr" aria-label="QR code for phone upload URL"></canvas>
          <p id="qrFallback" class="status-text"></p>
        </div>
        <p id="phoneUrl" class="phone-url" aria-label="LAN phone upload URL"></p>
        <button id="closeQrBtn" class="modal-close-button" type="button">Close</button>
      </section>
    </div>

    <details id="diagnosticsPanel" class="diagnostics-section" hidden>
      <summary>
        <span id="diagnosticsTitle">Server diagnostics</span>
        <span id="diagnosticsSummary" aria-live="polite">Checking</span>
      </summary>
      <dl id="diagnosticsList"></dl>
      <div id="diagnosticsWarning" hidden></div>
      <div id="diagnosticsUrls" hidden></div>
    </details>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
