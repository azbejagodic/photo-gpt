<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Photo Upload" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css" />
  <title>Photo Upload Tray</title>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Photo uploader</h1>
      <p class="helper">Take photos one-by-one or choose many from gallery. Photos stay in your selected tray until you upload them as one batch.</p>

      <div class="actions">
        <label class="input-btn" for="cameraInput">Take photo</label>
        <!--
          Camera input:
          - accept="image/*" limits the picker to image files.
          - capture="environment" hints rear camera on supported phones.
          - We intentionally omit `multiple` so this path is one photo per capture.
        -->
        <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />

        <label class="input-btn" for="galleryInput">Choose from gallery</label>
        <!--
          Gallery input:
          - accept="image/*" filters to photos/images.
          - multiple allows selecting many files in one picker action.
        -->
        <input id="galleryInput" type="file" accept="image/*" multiple hidden />

        <button id="uploadBtn" class="btn" type="button" disabled>Upload selected photos</button>
      </div>

      <p id="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="tray-head">
        <h2>Selected tray</h2>
        <span id="selectedCount" class="count">Selected: 0 / 20</span>
      </div>
      <div id="selectedGrid" class="grid"></div>
      <p id="selectedEmpty" class="empty">No photos selected yet.</p>
    </section>

  </main>

  <script src="/app.js"></script>
</body>
</html>
