<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Photo GPT Bridge" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#343940" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css" />
  <title>Photo GPT Bridge</title>
</head>
<body>
  <main class="app">
    <section class="card upload-card">
      <h1>Photo GPT Bridge</h1>

      <div class="actions">
        <label class="input-btn" for="cameraInput">Take photo</label>
        <!--
          Camera input:
          - accept="image/*" limits the picker to image files.
          - capture="environment" hints rear camera on supported phones.
          - We intentionally omit `multiple` so this path is one photo per capture.
        -->
        <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />

        <label class="input-btn" for="videoInput">Record video</label>
        <!--
          Video input:
          - accept limits the picker to supported video files.
          - capture="environment" hints rear camera on supported phones.
          - We intentionally omit `multiple` so this path is one video per capture.
        -->
        <input id="videoInput" type="file" accept="video/mp4,video/quicktime,video/webm" capture="environment" hidden />

        <label class="input-btn" for="galleryInput">Choose from gallery</label>
        <!--
          Gallery input:
          - accept filters to photos/images and supported videos.
          - multiple allows selecting many files in one picker action.
        -->
        <input id="galleryInput" type="file" accept="image/*,video/mp4,video/quicktime,video/webm" multiple hidden />

        <button id="uploadBtn" class="btn" type="button" disabled>Upload selected files</button>
      </div>

      <p id="status" class="pwa-status" aria-live="polite"></p>
    </section>

    <section class="card tray-card">
      <div class="tray-head">
        <h2>Selected tray</h2>
        <span id="selectedCount" class="count">Selected: 0 / 20</span>
      </div>
      <div id="selectedGrid" class="grid"></div>
    </section>

  </main>

  <script src="/app.js"></script>
</body>
</html>
